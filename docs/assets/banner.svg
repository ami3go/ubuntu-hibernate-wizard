<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" font-family="Cantarell, Inter, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#252a58"/>
      <stop offset="0.6" stop-color="#1d2148"/>
      <stop offset="1" stop-color="#141633"/>
    </linearGradient>
    <linearGradient id="hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23274e"/>
      <stop offset="1" stop-color="#181b38"/>
    </linearGradient>
    <linearGradient id="blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a90e8"/>
      <stop offset="1" stop-color="#2f6fd0"/>
    </linearGradient>
    <linearGradient id="blanketFold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a7cd8"/>
      <stop offset="1" stop-color="#2a5fb8"/>
    </linearGradient>
    <linearGradient id="titleg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9c8f5"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="520" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#cdd6ff">
    <circle cx="120" cy="70" r="2.4"/><circle cx="300" cy="120" r="1.6"/>
    <circle cx="520" cy="60" r="2"/><circle cx="700" cy="150" r="1.4"/>
    <circle cx="880" cy="70" r="1.8"/><circle cx="1050" cy="130" r="1.5"/>
    <circle cx="980" cy="330" r="1.6"/><circle cx="200" cy="300" r="1.4"/>
    <circle cx="1500" cy="90" r="1.8"/><circle cx="1420" cy="300" r="1.4"/>
    <path d="M420 90l3 7 7 3-7 3-3 7-3-7-7-3 7-3z"/>
    <path d="M960 210l2.4 5.6 5.6 2.4-5.6 2.4-2.4 5.6-2.4-5.6-5.6-2.4 5.6-2.4z"/>
    <path d="M1530 210l2.4 5.6 5.6 2.4-5.6 2.4-2.4 5.6-2.4-5.6-5.6-2.4 5.6-2.4z" opacity="0.7"/>
  </g>

  <!-- big crescent moon -->
  <path d="M1010 40a52 52 0 1 0 43 70 41 41 0 0 1-43-70z" fill="#f3e9c8"/>

  <!-- rolling hills -->
  <path d="M0 430q200-70 420-30t480 10q260-40 420 10t280 10v90H0z" fill="url(#hills)"/>

  <!-- ================= LEFT: text block ================= -->
  <text x="90" y="170" font-size="88" font-weight="800" fill="url(#titleg)">Hibernate Wizard</text>
  <text x="92" y="222" font-size="34" font-weight="600" fill="#8fa3e8">for Ubuntu</text>
  <line x1="92" y1="252" x2="700" y2="252" stroke="#4a5490" stroke-width="2"/>
  <text x="92" y="308" font-size="40" font-weight="700" fill="#9db4f2">Enable · Verify · Repair</text>

  <!-- feature badges -->
  <g font-size="22" font-weight="600" fill="#dfe6ff">
    <g transform="translate(92 360)">
      <rect width="64" height="64" rx="16" fill="#2f6fd0"/>
      <path d="M32 16a16 16 0 1 0 13 21 12.5 12.5 0 0 1-13-21z" fill="#fff"/>
      <text x="80" y="27">Save</text><text x="80" y="53">Power</text>
    </g>
    <g transform="translate(300 360)">
      <rect width="64" height="64" rx="16" fill="#2f6fd0"/>
      <path d="M32 14l16 6v12c0 11-7 17-16 20-9-3-16-9-16-20V20z" fill="#fff"/>
      <path d="M25 33l5 5 10-10" stroke="#2f6fd0" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="80" y="27">Safe &amp;</text><text x="80" y="53">Reliable</text>
    </g>
    <g transform="translate(520 360)">
      <rect width="64" height="64" rx="16" fill="#2f6fd0"/>
      <circle cx="32" cy="32" r="9" fill="none" stroke="#fff" stroke-width="5"/>
      <g stroke="#fff" stroke-width="5" stroke-linecap="round">
        <path d="M32 13v7M32 44v7M13 32h7M44 32h7M19 19l5 5M40 40l5 5M45 19l-5 5M24 40l-5 5"/>
      </g>
      <text x="80" y="27">Easy</text><text x="80" y="53">Setup</text>
    </g>
  </g>

  <!-- ================= CENTER: penguin mascot ================= -->
  <g transform="translate(790 120) scale(2.85)">
    <path d="M64 44c-22 0-36 15-36 36 0 12 6 20 14 24h44c8-4 14-12 14-24 0-21-14-36-36-36z" fill="url(#blanket)"/>
    <path d="M28 92c4 10 14 16 36 16s32-6 36-16c-8 6-20 9-36 9s-28-3-36-9z" fill="url(#blanketFold)"/>
    <path d="M42 62c8-8 36-8 44 0-4 12-8 18-22 18s-18-6-22-18z" fill="url(#blanketFold)" opacity="0.55"/>
    <path d="M44 82a7 7 0 1 0 6 9.5A5.6 5.6 0 0 1 44 82z" fill="#bcd6ff" opacity="0.9"/>
    <path d="M84 86l1.2 2.7 2.8 1.1-2.8 1.1-1.2 2.7-1.2-2.7-2.8-1.1 2.8-1.1z" fill="#bcd6ff" opacity="0.9"/>
    <path d="M64 26c-13 0-21 9-21 21 0 8 4 13 9 15h24c5-2 9-7 9-15 0-12-8-21-21-21z" fill="#2b2b33"/>
    <path d="M64 38c-8 0-13 5-13 12 0 6 3 10 7 12h12c4-2 7-6 7-12 0-7-5-12-13-12z" fill="#f4f1ea"/>
    <path d="M53 49q3.5 3 7 0" fill="none" stroke="#2b2b33" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M68 49q3.5 3 7 0" fill="none" stroke="#2b2b33" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M58 56c0-3 3-5 6-5s6 2 6 5-3 5.5-6 5.5-6-2.5-6-5.5z" fill="#f4a63a"/>
    <path d="M58 56.5c2 1.6 10 1.6 12 0-1 3-3.5 5-6 5s-5-2-6-5z" fill="#e08f22"/>
    <g fill="#cdd6ff"><path d="M88 30h8l-8 8h8v3h-13l8-8h-3z" transform="translate(2 -6) scale(0.9)"/></g>
  </g>

  <!-- ================= RIGHT: GTK/libadwaita window mockup ================= -->
  <g transform="translate(1180 70)">
    <rect width="360" height="380" rx="16" fill="#242424" stroke="#000" stroke-opacity="0.4"/>
    <!-- Adwaita headerbar: title centered, single circular close on right -->
    <rect width="360" height="46" rx="16" fill="#2e2e2e"/>
    <rect y="30" width="360" height="16" fill="#2e2e2e"/>
    <text x="180" y="30" font-size="17" font-weight="700" fill="#fff" text-anchor="middle">Hibernate Wizard</text>
    <circle cx="328" cy="23" r="12" fill="#454545"/>
    <path d="M323 18l10 10M333 18l-10 10" stroke="#ddd" stroke-width="2" stroke-linecap="round"/>
    <!-- boxed list rows -->
    <g font-size="17" fill="#eee">
      <rect x="18" y="64" width="324" height="232" rx="12" fill="#303030"/>
      <text x="36" y="100">System Check</text>
      <circle cx="316" cy="94" r="10" fill="#2ec27e"/><path d="M311 94l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <line x1="18" y1="122" x2="342" y2="122" stroke="#3d3d3d"/>
      <text x="36" y="158">Enable Hibernation</text>
      <circle cx="316" cy="152" r="10" fill="#2ec27e"/><path d="M311 152l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <line x1="18" y1="180" x2="342" y2="180" stroke="#3d3d3d"/>
      <text x="36" y="216">Verify Configuration</text>
      <circle cx="316" cy="210" r="10" fill="#2ec27e"/><path d="M311 210l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <line x1="18" y1="238" x2="342" y2="238" stroke="#3d3d3d"/>
      <text x="36" y="274">Repair Issues</text>
      <circle cx="316" cy="268" r="10" fill="none" stroke="#777" stroke-width="2.4"/>
    </g>
    <!-- suggested-action pill button -->
    <rect x="90" y="316" width="180" height="44" rx="22" fill="#3584e4"/>
    <path d="M124 328a11 11 0 1 0 9 15 8.5 8.5 0 0 1-9-15z" fill="#fff"/><text x="198" y="345" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">Hibernate</text>
  </g>
</svg>
