site_name: Hibernate Wizard for Ubuntu
site_description: Enable, verify, and repair Ubuntu hibernation with swap file, GRUB resume_offset, initramfs, systemd, and GNOME Hibernate button guidance.
site_author: ami3go
site_url: https://ami3go.github.io/ubuntu-hibernate-wizard/
repo_url: https://github.com/ami3go/ubuntu-hibernate-wizard
repo_name: ami3go/ubuntu-hibernate-wizard
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      toggle: { icon: material/weather-night, name: Dark mode }
    - scheme: slate
      toggle: { icon: material/weather-sunny, name: Light mode }
markdown_extensions: [admonition, tables, pymdownx.superfences]
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - How Hibernation Works: how-hibernation-works.md
  - Troubleshooting: troubleshooting.md
  - Rollback & Recovery: rollback-and-recovery.md
  - Architecture: architecture.md
  - Testing: testing.md
  - GitHub Pages: github-pages.md
  - FAQ: faq.md
